<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Entrenador ADR - Grups de Compatibilitat</title>
<style>
    :root { 
        --primary: #2c3e50; --success: #27ae60; --error: #e74c3c; 
        --accent: #007BFF; --bg-color: #f0f2f5; --explosive-orange: #ff8c00;
        --gray: #6c757d;
    }
    body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); overflow: hidden; }
    #sidebar { width: 350px; background: white; padding: 20px; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
    .btn-menu { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; transition: 0.3s; }
    .btn-menu:hover { background: var(--accent); }
    .btn-menu.active { background: var(--explosive-orange); }
    #main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; justify-content: center; position: relative; }
    
    /* MATCH GAME */
    #match-game { display: none; flex-direction: column; align-items: center; width: 100%; }
    .def-display { background: #fff4e5; border: 2px solid var(--explosive-orange); padding: 20px; border-radius: 12px; margin-bottom: 30px; font-size: 1.1em; text-align: center; max-width: 700px; min-height: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .grid-letters { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 700px; }
    .card { width: 70px; height: 70px; background: white; border: 3px solid var(--primary); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.8em; font-weight: 900; cursor: pointer; transition: 0.2s; }
    .card:hover { transform: scale(1.05); border-color: var(--accent); }
    .card.correct { background: var(--success); color: white; border-color: #1e7e34; pointer-events: none; opacity: 0.4; }
    .card.wrong { background: var(--error); color: white; animation: shake 0.3s; }

    /* TEST GAME */
    #test-game { display: none; width: 100%; max-width: 800px; }
    .question-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .option { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: left; cursor: pointer; background: #f9f9f9; transition: 0.2s; font-size: 1em; }
    .option:hover { background: #eef7ff; }
    .option.correct-opt { background: #d4edda !important; color: #155724; border-color: var(--success); }
    .option.error-opt { background: #f8d7da !important; color: #721c24; border-color: var(--error); }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
</style>
</head>
<body>

<div id="sidebar">
    <a href="../index.html" style="text-decoration:none; color:var(--gray); font-weight:bold; margin-bottom:20px; display:block;">🏠 Inici</a>
    <h2>Classe 1: Explosius</h2>
    <button id="btnRelacionar" class="btn-menu" onclick="showGame('match')">🔗 Mode Relacionar</button>
    <button id="btnTest" class="btn-menu" onclick="showGame('test')">📝 Mode Test (Preguntes 50)</button>
    
    <div style="margin-top:auto; padding:15px; background:#eee; border-radius:8px;">
        <div class="status">Punts: <span id="current-score">0</span></div>
        <div id="progress-text" style="font-size:0.85em; color:#555;">Llest per començar</div>
    </div>
</div>

<div id="main-content">
    <div id="welcome" style="text-align:center; align-self:center;">
        <h1>Entrenament de Compatibilitat</h1>
        <p>Selecciona un mode per practicar els Grups de la Classe 1.</p>
    </div>

    <div id="match-game">
        <div class="def-display" id="match-def">Carregant definició...</div>
        <div class="grid-letters" id="match-grid"></div>
    </div>

    <div id="test-game">
        <div id="test-container"></div>
    </div>
</div>

<script>
    const grupos = [
        { l: 'A', d: "Materia explosiva primaria. Extremadament sensible. La seva funció és la d’iniciar una detonació, no la de causar una gran detonació per si sola." },
        { l: 'B', d: "Objectes que continguin materia explosiva primaria i menys de dos sistemes de seguretat. Objectes com detonadors de voladura, conjunts de detonadors i encebs de percussió, encara que no continguin materia explosiva primaria." },
        { l: 'C', d: "Materies explosives deflagrants i propulsores, i objectes que continguin aquestes materies." },
        { l: 'D', d: "Matèria explosiva secundària detonant o pòlvora negra, o objecte que contingui una matèria explosiva secundària detonant, en qualsevol cas sense mitjans d'enceb ni càrrega propulsora, o objecte que contingui una matèria explosiva primària i que tingui almenys dos dispositius de seguretat eficaços." },
        { l: 'E', d: "Objecte que contingui una matèria explosiva secundària detonant, sense mitjans d'enceb, amb càrrega propulsora (excepte les que continguin un líquid o gel inflamable o líquids hipergol·lics)." },
        { l: 'F', d: "Objecte que contingui una matèria explosiva secundària detonant, amb els seus propis mitjans d'enceb, amb una càrrega propulsora (excepte les que continguin un líquid o gel inflamable o líquids hipergol·lics) o sense càrrega propulsora." },
        { l: 'G', d: "Matèria pirotècnica o objecte que contingui una matèria pirotècnica, o bé un objecte que contingui a la vegada una matèria explosiva i una composició il·luminant, incendiària, lacrimògena o fumígena (excepte els objectes activats per l'aigua o que continguin fòsfor blanc, fosfurs, matèries pirofòriques, líquids o gels inflamables o líquids hipergol·lics)." },
        { l: 'H', d: "Objecte que contingui una matèria explosiva i, a més, fòsfor blanc." },
        { l: 'J', d: "Objecte que contingui una matèria explosiva i, a més, un líquid o gel inflamable." },
        { l: 'K', d: "Objecte que contingui una matèria explosiva i, a més, un agent químic tòxic." },
        { l: 'L', d: "Matèries explosives o objectes que continguin matèries explosives i que presentin un risc particular (per exemple, per la seva hidroactivitat o per la presència de líquids hipergol·lics, fosfurs o matèries pirofòriques) i que exigeixin l’aïllament de cada tipus." },
        { l: 'N', d: "Objectes que no continguin més que matèries extremadament insensibles." },
        { l: 'S', d: "Matèria o objecte embalat o concebut de tal manera que tot efecte perillós degut a un funcionament accidental quedi confinat a l'interior del bulto, a menys que l'embalatge hagi estat degradat pel foc, cas en el qual els efectes d'ona expansiva o de projeccions han de ser prou limitats per no entorpir l'extinció de l'incendi ni l'adopció de mesures d'emergència en les proximitats immediates del bulto." }
    ];

    let testData = [];
    let testIndex = 0;
    let testScore = 0;

    async function loadTestQuestions() {
        try {
            const response = await fetch('preguntas.json');
            const data = await response.json();
            testData = data.preguntas;
            startTest();
        } catch (error) {
            alert("Error carregant el fitxer preguntas.json. Assegura't que estigui a la mateixa carpeta.");
        }
    }

    function showGame(mode) {
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('match-game').style.display = 'none';
        document.getElementById('test-game').style.display = 'none';
        
        // Reset actives
        document.getElementById('btnRelacionar').classList.remove('active');
        document.getElementById('btnTest').classList.remove('active');

        if(mode === 'match') {
            document.getElementById('btnRelacionar').classList.add('active');
            document.getElementById('match-game').style.display = 'flex';
            initMatch();
        } else {
            document.getElementById('btnTest').classList.add('active');
            document.getElementById('test-game').style.display = 'block';
            loadTestQuestions();
        }
    }

    // --- MODO RELACIONAR ---
    let matchTarget = null;
    let matchScore = 0;
    function initMatch() {
        matchScore = 0;
        const grid = document.getElementById('match-grid');
        grid.innerHTML = '';
        grupos.forEach(g => g.done = false);
        
        // ORDEN ALFABÈTIC: Ordenem una còpia de la llista per lletra
        const sortedGroups = [...grupos].sort((a, b) => a.l.localeCompare(b.l));

        sortedGroups.forEach(g => {
            const card = document.createElement('div');
            card.className = 'card'; 
            card.textContent = g.l;
            card.id = "card-" + g.l; // ID per trobar-la fàcilment
            card.onclick = () => {
                if(g.l === matchTarget.l) {
                    g.done = true; matchScore++;
                    card.classList.add('correct');
                    updateStats(matchScore, 13, "Correcte!");
                    nextMatch();
                } else {
                    card.classList.add('wrong');
                    setTimeout(() => card.classList.remove('wrong'), 300);
                }
            };
            grid.appendChild(card);
        });
        nextMatch();
    }

    function nextMatch() {
        const pending = grupos.filter(g => !g.done);
        if(pending.length === 0) { 
            document.getElementById('match-def').innerHTML = "<strong>🏆 COMPLETAT!</strong>"; 
            return; 
        }
        // La definició sí que apareix aleatòriament
        matchTarget = pending[Math.floor(Math.random() * pending.length)];
        document.getElementById('match-def').textContent = matchTarget.d;
    }

    // --- MODO TEST ---
    function startTest() {
        testIndex = 0; testScore = 0;
        renderTestQuestion();
    }
    function renderTestQuestion() {
        const container = document.getElementById('test-container');
        if(testIndex >= testData.length) {
            container.innerHTML = `<h2>Test Finalitzat</h2><p>Resultat: ${testScore}/${testData.length}</p><button class="btn-menu" onclick="startTest()">Tornar a començar</button>`;
            return;
        }
        const q = testData[testIndex];
        container.innerHTML = `
            <div class="question-card">
                <h3>${testIndex + 1}. ${q.q}</h3>
                ${q.a.map((opt, i) => `<button class="option" onclick="checkTest(${i})">${opt}</button>`).join('')}
            </div>`;
        updateStats(testScore, testData.length, `Pregunta ${testIndex + 1}`);
    }
    function checkTest(idx) {
        const q = testData[testIndex];
        const btns = document.querySelectorAll('.option');
        if(idx === q.c) { btns[idx].classList.add('correct-opt'); testScore++; }
        else { btns[idx].classList.add('error-opt'); btns[q.c].classList.add('correct-opt'); }
        testIndex++;
        setTimeout(renderTestQuestion, 1200);
    }

    function updateStats(s, t, txt) {
        document.getElementById('current-score').textContent = s + "/" + t;
        document.getElementById('progress-text').textContent = txt;
    }
</script>
</body>
</html>
