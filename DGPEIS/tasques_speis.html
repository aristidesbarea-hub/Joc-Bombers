<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>DGPEIS - Entrenament de Tasques</title>
    <style>
        :root { --node-w: 200px; --node-h: auto; }
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #f0f2f5; }
        
        .side-panel {
            position: absolute; left: 0; top: 0; bottom: 0; width: 320px;
            background: white; border-right: 1px solid #ccc; z-index: 1000;
            display: flex; flex-direction: column; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        /* Estils Barra de Progrés */
        .progress-container {
            margin: 15px 0;
            background-color: #eee;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #ccc;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: #27ae60;
            transition: width 0.3s ease;
        }
        #progress-text {
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 5px;
        }

        #task-card {
            background: #fff; border: 2px solid #3498db; border-radius: 8px;
            padding: 15px; margin: 15px 0; min-height: 100px;
            display: flex; flex-direction: column; justify-content: center;
            font-size: 14px; line-height: 1.4;
        }

        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; }
        #canvas { position: absolute; width: 1px; height: 1px; transform-origin: 0 0; }
        
        .node {
            position: absolute; width: var(--node-w); min-height: 50px;
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 13px; text-align: center; 
            border-radius: 4px; z-index: 10; padding: 10px; box-sizing: border-box;
            word-wrap: break-word; cursor: pointer; transition: all 0.2s;
        }
        
        .node:hover { transform: scale(1.05); filter: brightness(1.1); }
        .bg-sgo { background: #e74c3c; }
        .bg-sgstaip { background: #27ae60; }
        .bg-sgair { background: #9b59b6; }
        .bg-root { background: #222; }

        #svg-lines { position: absolute; top: 0; left: 0; width: 8000px; height: 8000px; pointer-events: none; }

        button { padding: 10px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background: #fff; font-weight: bold; margin-bottom: 5px; }
        
        .btn-return { 
            background: #34495e; 
            color: white; 
            border: none; 
            text-decoration: none; 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .btn-return:hover { background: #2c3e50; }

        .btn-hint { background: #f1c40f; border: none; color: #222; }
        .btn-save { background: #34495e; border: none; color: white; margin-top: auto; }

        #feedback { font-weight: bold; text-align: center; padding: 12px; border-radius: 4px; margin-top: 10px; display: none; }
        #hint-text { font-size: 12px; color: #7f8c8d; font-style: italic; margin-top: 10px; display: none; background: #fef9e7; padding: 8px; border-radius: 4px; border-left: 3px solid #f1c40f; }
    </style>
</head>
<body>

<div class="side-panel">
    <button class="btn-return" onclick="window.location.href='/index.html'">🏠 Tornar a l'Inici</button>
    <button onclick="window.location.reload()">🔄 Reiniciar</button>
    
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="progress-text">Progrés: 0 / 0</div>
    
    <h3 style="margin-bottom: 5px;">📍 Tasca Actual:</h3>
    <div id="task-card">
        <p id="task-text">Carregant dades...</p>
    </div>

    <button class="btn-hint" onclick="showHint()">💡 Veure Resposta</button>
    <div id="hint-text"></div>

    <div id="feedback"></div>

    <button class="btn-save" onclick="saveStats()">💾 Guardar Estadístiques</button>
</div>

<div id="viewport">
    <div id="canvas">
        <svg id="svg-lines"></svg>
        <div id="nodes-container"></div>
    </div>
</div>

<script>
    let organigramaData = [];
    let allMissions = []; // Totes les missions originals
    let remainingMissions = []; // Missions que falten per contestar
    let totalMissionsCount = 0;
    
    let currentMission = null;
    let placedNodes = [{ id: 'root', name: 'DGPEIS', parent: null, cat: 'root' }];
    let scale = 0.7;
    let posX = 0, posY = 0;

    let statsData = {}; 
    let currentAttempts = 0;
    let hintUsed = false;

    function slugify(text) {
        if(!text) return "";
        return text.toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').trim();
    }

    async function init() {
        try {
            const resOrg = await fetch('organigrama.json');
            organigramaData = await resOrg.json();
            placedNodes = [...placedNodes, ...organigramaData];

            const resMissions = await fetch('tareas_listas.json');
            allMissions = await resMissions.json();
            remainingMissions = [...allMissions]; // Copiem la llista
            totalMissionsCount = allMissions.length;

            try {
                const resStats = await fetch('estad_tasca.json');
                if (resStats.ok) {
                    statsData = await resStats.json();
                }
            } catch (e) {
                console.log("No s'ha trobat estad_tasca.json");
            }

            updateProgress();
            render();
            centerView();
            nextMission();
        } catch (e) {
            console.error("Error carregant fitxers:", e);
            document.getElementById('task-text').textContent = "Error al carregar JSON.";
        }
    }

    function updateProgress() {
        const completed = totalMissionsCount - remainingMissions.length;
        const percent = (completed / totalMissionsCount) * 100;
        document.getElementById('progress-bar').style.width = percent + "%";
        document.getElementById('progress-text').textContent = `Progrés: ${completed} / ${totalMissionsCount}`;
    }

    function nextMission() {
        if (remainingMissions.length === 0) {
            document.getElementById('task-text').innerHTML = "<b>🎉 Has completat totes les tasques!</b><br>Guarda les teves estadístiques.";
            document.getElementById('feedback').style.display = 'none';
            return;
        }

        // Selecció aleatòria i eliminació de la llista
        const index = Math.floor(Math.random() * remainingMissions.length);
        currentMission = remainingMissions.splice(index, 1)[0];
        
        currentAttempts = 0;
        hintUsed = false;

        document.getElementById('task-text').textContent = currentMission.tarea;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('hint-text').style.display = 'none';
        document.getElementById('hint-text').textContent = currentMission.pista;
        
        document.querySelectorAll('.node').forEach(n => n.style.outline = "none");
        updateProgress();
    }

    function showHint() {
        document.getElementById('hint-text').style.display = 'block';
        hintUsed = true;
    }

    function checkAnswer(nodeId, element) {
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';

        if (slugify(nodeId) === slugify(currentMission.correcta)) {
            const taskName = currentMission.tarea;
            if (!statsData[taskName]) statsData[taskName] = [];
            statsData[taskName].push([currentAttempts, hintUsed ? 0 : 1]);

            fb.textContent = "✅ CORRECTE!";
            fb.style.background = "#d4edda"; fb.style.color = "#155724";
            element.style.outline = "4px solid #27ae60";
            
            setTimeout(nextMission, 1200);
        } else {
            currentAttempts++; 
            fb.textContent = "❌ INCORRECTE";
            fb.style.background = "#f8d7da"; fb.style.color = "#721c24";
            element.style.outline = "4px solid #e74c3c";
            setTimeout(() => {
                element.style.outline = "none";
                fb.style.display = 'none';
            }, 1000);
        }
    }

    // Mateixa lògica de dibuix de l'organigrama...
    function calculatePositions() {
        const gapX = 60; const gapY = 120;
        placedNodes.forEach(n => { n.children = []; });
        placedNodes.forEach(n => {
            if (n.parent) {
                const p = placedNodes.find(x => x.id === n.parent);
                if (p) { p.children.push(n); n.level = (p.level || 1) + 1; }
            } else { n.level = 1; }
        });

        function getSubtreeWidth(node) {
            if (node.level >= 3 || node.children.length === 0) return 220;
            let width = node.children.reduce((acc, child) => acc + getSubtreeWidth(child), 0);
            return width + (node.children.length - 1) * gapX;
        }

        function positionNode(node, xOffset, y) {
            node.y = y;
            const width = getSubtreeWidth(node);
            if (node.level < 3) {
                node.x = xOffset + (width / 2) - 100;
                let currentX = xOffset;
                node.children.forEach(child => {
                    positionNode(child, currentX, y + gapY);
                    currentX += getSubtreeWidth(child) + gapX;
                });
            } else {
                node.x = xOffset + 30; 
                let nextY = node.y + 80;
                node.children.forEach((child) => {
                    nextY = positionNode(child, node.x, nextY) + 70;
                });
                return nextY - 70;
            }
            return y;
        }
        positionNode(placedNodes[0], 4000 - (getSubtreeWidth(placedNodes[0]) / 2), 50);
    }

    function render() {
        calculatePositions();
        const container = document.getElementById('nodes-container');
        container.innerHTML = '';
        placedNodes.forEach(node => {
            const div = document.createElement('div');
            div.className = `node bg-${node.cat || 'sgo'}`;
            div.style.left = node.x + 'px';
            div.style.top = node.y + 'px';
            div.textContent = node.name;
            div.onclick = () => { if(currentMission) checkAnswer(node.id, div) };
            container.appendChild(div);
            node.actualH = div.offsetHeight;
        });
        drawLines();
    }

    function drawLines() {
        const svg = document.getElementById('svg-lines');
        svg.innerHTML = '';
        placedNodes.forEach(node => {
            if (!node.parent) return;
            const parent = placedNodes.find(p => p.id === node.parent);
            if(!parent) return;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const pH = parent.actualH || 50;
            let d;
            if (node.level <= 3) {
                const startY = parent.y + pH;
                const midY = startY + (node.y - startY) / 2;
                d = `M ${parent.x + 100} ${startY} V ${midY} H ${node.x + 100} V ${node.y}`;
            } else {
                const axisX = parent.x + 20; 
                const startY = parent.y + pH;
                const endY = node.y + (node.actualH / 2);
                d = `M ${axisX} ${startY} V ${endY} H ${node.x}`;
            }
            path.setAttribute("d", d);
            path.setAttribute("stroke", "#95a5a6");
            path.setAttribute("stroke-width", "2");
            path.setAttribute("fill", "none");
            svg.appendChild(path);
        });
    }

    function centerView() {
        const root = placedNodes[0];
        scale = 0.7;
        posX = (window.innerWidth / 2 + 150) - (root.x + 100) * scale;
        posY = 60;
        updateTransform();
    }

    function updateTransform() {
        document.getElementById('canvas').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function saveStats() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(statsData, null, 4));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "estad_tasca.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    let isPanning = false, startX, startY;
    const viewport = document.getElementById('viewport');
    viewport.onmousedown = e => { if(e.button === 0 && e.target.id === 'viewport') { isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; }};
    window.onmousemove = e => { if(isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); }};
    window.onmouseup = () => isPanning = false;
    viewport.onwheel = e => {
        e.preventDefault();
        const delta = e.deltaY * -0.001;
        const oldScale = scale;
        scale = Math.min(Math.max(0.1, scale + delta), 2);
        const rect = viewport.getBoundingClientRect();
        const mX = e.clientX - rect.left, mY = e.clientY - rect.top;
        posX = mX - ((mX - posX) / oldScale) * scale;
        posY = mY - ((mY - posY) / oldScale) * scale;
        updateTransform();
    };

    init();
</script>
</body>
</html>
