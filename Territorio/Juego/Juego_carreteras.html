<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Joc de Carreteres i Ciutats</title>
<style>
  :root { 
    --primary: #2c3e50; 
    --success: #27ae60; 
    --error: #e74c3c; 
    --accent: #007BFF; 
    --bg-color: #f0f2f5;
    --gray-back: #6c757d;
  }

  body { 
    display: flex; 
    height: 100vh; 
    margin: 0; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: var(--bg-color);
  }

  #sidebar {
    width: 300px;
    background: white;
    padding: 20px;
    box-sizing: border-box;
    border-right: 1px solid #ddd;
    box-shadow: 2px 0 10px rgba(0,0,0,0.05);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    z-index: 10;
  }

  h2 { color: var(--primary); font-size: 1.4em; margin: 15px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }

  .btn-home-small {
    display: inline-block;
    background: var(--gray-back);
    color: white;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 6px;
    font-size: 0.9em;
    font-weight: bold;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s;
    align-self: flex-start;
  }
  .btn-home-small:hover { background: #5a6268; }

  #mapContainer { 
    flex: 1; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    background: #e9ecef; 
    padding: 20px;
  }

  svg { 
    border-radius: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    max-width: 100%; 
    max-height: 100%; 
    background: #ffffff; 
  }
  
  .comarca { stroke: #ccc; stroke-width: 0.5; fill: transparent; }
  .road { stroke-width: 4; fill: none; transition: stroke 0.3s; stroke-linecap: round; }
  .road.correct { stroke: var(--success); }
  .road.target { stroke: var(--error); stroke-dasharray: 8; animation: dash 2s linear infinite; }
  
  @keyframes dash { to { stroke-dashoffset: -20; } }

  .city-point { fill: var(--primary); r: 3; }
  .city-label { 
    font-size: 10px; 
    font-weight: bold; 
    fill: #000; 
    paint-order: stroke;
    stroke: #ffffff;
    stroke-width: 2.5px;
    stroke-linecap: butt;
    stroke-linejoin: miter;
    text-anchor: middle; 
    pointer-events: none; 
  }

  .btnRoad { 
    display: block; 
    width: 100%; 
    padding: 10px 12px; 
    margin: 4px 0; 
    border: 1px solid #eee; 
    background: #f8f9fa; 
    cursor: pointer; 
    text-align: left; 
    border-radius: 6px;
    font-weight: 500;
    transition: all 0.2s;
    font-size: 0.9em;
  }
  .btnRoad:hover { background: #e9ecef; border-color: var(--accent); }
  .btnRoad.correct { background: #d4edda; color: #155724; border-color: #c3e6cb; }
  .btnRoad.wrong { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }

  #hintButton {
    background-color: var(--accent);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #hintButton:hover { background-color: #0056b3; }

  #hintText { margin-left: 10px; font-weight: bold; color: var(--error); font-size: 0.9em; }

  .final-msg {
    background: #d4edda;
    color: #155724;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-weight: bold;
    text-align: center;
  }
</style>
</head>
<body>

<div id="sidebar">
  <a href="../../../index.html" class="btn-home-small">🏠 Inici</a>
  
  <h2>Joc de Carreteres</h2>
  
  <div style="display: flex; align-items: center; margin-bottom: 15px; background: #fff3cd; padding: 10px; border-radius: 8px; border: 1px solid #ffeeba;">
    <button id="hintButton">Pista</button>
    <span id="hintText"></span>
  </div>
  
  <div id="roadButtons"></div>
</div>

<div id="mapContainer">
  <svg viewBox="0 0 800 800">
    <g id="backgroundLayer">
      <image href="MRelieve.png" x="0" y="0" width="800" height="800"></image>
    </g>
    <g id="comarcasLayer"></g>
    <g id="roadsLayer"></g>
    <g id="cityPointsLayer"></g>
    <g id="citiesLayer"></g>
  </svg>
</div>

<script>
  let comarcas = [];
  let carreteras = [];
  let originalCiudades = [];
  let ciudadesConCajas = [];
  let answeredCorrectPermanent = new Set();
  let targetRoad = null;
  
  const comarcasLayer = document.getElementById('comarcasLayer');
  const roadsLayer = document.getElementById('roadsLayer');
  const cityPointsLayer = document.getElementById('cityPointsLayer');
  const citiesLayer = document.getElementById('citiesLayer');
  const roadButtonsDiv = document.getElementById('roadButtons');
  const hintButton = document.getElementById('hintButton');
  const hintText = document.getElementById('hintText');

  async function loadData() {
    try {
      const timestamp = new Date().getTime();
      const [comRes, carRes, ciuRes, cajRes] = await Promise.all([
        fetch(`comarcas.json?t=${timestamp}`),
        fetch(`carreteras.json?t=${timestamp}`),
        fetch(`ciudades.json?t=${timestamp}`),
        fetch(`nuevas_posiciones_ciudades_cajas.json?t=${timestamp}`)
      ]);
      
      comarcas = await comRes.json();
      carreteras = await carRes.json();
      originalCiudades = await ciuRes.json();
      ciudadesConCajas = await cajRes.json();

      initializeGame();
    } catch (error) {
      console.error('Error carregant dades:', error);
    }
  }

  function drawMap() {
    comarcasLayer.innerHTML = "";
    if (comarcas?.comarcas) {
      comarcas.comarcas.forEach(comarca => {
        comarca.polygons.forEach(polygon => {
          const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
          poly.setAttribute("points", polygon.points.map(p => `${p.x},${p.y}`).join(" "));
          poly.setAttribute("class", "comarca");
          comarcasLayer.appendChild(poly);
        });
      });
    }

    cityPointsLayer.innerHTML = "";
    citiesLayer.innerHTML = "";
    
    if (originalCiudades?.ciudades && ciudadesConCajas?.ciudades) {
      ciudadesConCajas.ciudades.forEach(ciudadConCaja => {
        const ciudadOriginal = originalCiudades.ciudades.find(c => c.nombre === ciudadConCaja.nombre);
        
        // Dibuixar el punt negre a la ubicació real
        if (ciudadOriginal) {
          const cityPoint = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          cityPoint.setAttribute("cx", ciudadOriginal.x);
          cityPoint.setAttribute("cy", ciudadOriginal.y);
          cityPoint.setAttribute("class", "city-point");
          cityPointsLayer.appendChild(cityPoint);
        }

        // Dibuixar el text a la posició de la caixa
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("class", "city-label");
        // Centrem el text en la caixa (x + width/2)
        text.setAttribute("x", ciudadConCaja.x + (ciudadConCaja.width / 2));
        text.setAttribute("y", ciudadConCaja.y); 
        
        if (ciudadConCaja.lines) {
          ciudadConCaja.lines.forEach((lineText, index) => {
            const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspan.setAttribute("x", ciudadConCaja.x + (ciudadConCaja.width / 2));
            tspan.setAttribute("dy", index === 0 ? "0" : "1.1em");
            tspan.textContent = lineText;
            text.appendChild(tspan);
          });
        }
        citiesLayer.appendChild(text);
      });
    }
  }

  function initializeGame() {
    drawMap();
    targetRoad = getRandomRoad();
    updateButtons();
    drawRoads();
    hintButton.onclick = giveHint;
  }

  function getRandomRoad() {
    const unans = carreteras.carreteras.filter(r => !answeredCorrectPermanent.has(r.nombre));
    if (unans.length === 0) {
      showEndGameOptions();
      return null;
    }
    return unans[Math.floor(Math.random() * unans.length)];
  }

  function showEndGameOptions() {
    roadButtonsDiv.innerHTML = '';
    const congratsMsg = document.createElement('div');
    congratsMsg.className = 'final-msg';
    congratsMsg.textContent = "🏆 Felicitats! Has completat totes les carreteres.";
    roadButtonsDiv.appendChild(congratsMsg);
    
    const restartBtn = document.createElement('button');
    restartBtn.textContent = "Reiniciar Joc";
    restartBtn.className = 'btnRoad';
    restartBtn.style.textAlign = "center";
    restartBtn.onclick = () => location.reload();
    roadButtonsDiv.appendChild(restartBtn);
  }

  function updateButtons() {
    roadButtonsDiv.innerHTML = '';
    const allRoads = [...carreteras.carreteras].sort((a, b) => a.nombre.localeCompare(b.nombre));
    
    allRoads.forEach(road => {
      const button = document.createElement('button');
      button.className = 'btnRoad';
      button.textContent = road.nombre;
      button.onclick = () => checkAnswer(road, button);
      if (answeredCorrectPermanent.has(road.nombre)) {
        button.classList.add('correct');
      }
      roadButtonsDiv.appendChild(button);
    });
    hintText.textContent = '';
  }

  function giveHint() {
    if (!targetRoad) return;
    hintText.textContent = targetRoad.nombre;
    answeredCorrectPermanent.add(targetRoad.nombre);
    drawRoads();
    
    setTimeout(() => {
        targetRoad = getRandomRoad();
        if (targetRoad) {
          updateButtons();
          drawRoads();
        }
    }, 1500);
  }

  function drawRoads() {
    roadsLayer.innerHTML = "";
    carreteras.carreteras.forEach(r => {
      const isTarget = targetRoad && r.nombre === targetRoad.nombre;
      const isCorrect = answeredCorrectPermanent.has(r.nombre);
      
      if (isCorrect || isTarget) {
        r.segmentos.forEach(seg => {
          const poly = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
          poly.setAttribute("points", seg.puntos.map(p => p.join(",")).join(" "));
          poly.setAttribute("class", isTarget && !isCorrect ? "road target" : "road correct");
          roadsLayer.appendChild(poly);
        });
      }
    });
  }

  function checkAnswer(road, button) {
    if (!targetRoad) return;
    if (road.nombre === targetRoad.nombre) {
      button.classList.add("correct");
      answeredCorrectPermanent.add(road.nombre);
      drawRoads();
      setTimeout(() => {
        targetRoad = getRandomRoad();
        if (targetRoad) {
          updateButtons();
          drawRoads();
        }
      }, 1000);
    } else {
      button.classList.add("wrong");
      setTimeout(() => button.classList.remove("wrong"), 1000);
    }
  }

  loadData();
</script>
</body>
</html>
